<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>square-color</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* --- Styles derived from square45-calc --- */
        #square-color-app {
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            padding: 10px;
            max-width: 100%;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 14px;
        }

        #square-color-app .row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        #square-color-app .row-start {
            align-items: flex-start;
        }

        #square-color-app .inline-field {
            display: flex;
            flex-direction: column;
        }

        #square-color-app .inline-field label {
            font-size: 12px;
            margin-bottom: 4px;
            font-weight: bold;
            color: #374151;
        }

        #square-color-app .input-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #square-color-app input.narrow-input {
            width: 3.5em;
            padding: 4px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }

        #square-color-app input.mini {
            width: 3.2em;
        }

        #square-color-app select {
            padding: 4px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: #fff;
        }

        #square-color-app .btn-blue {
            display: inline-block;
            padding: 4px 10px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: background 0.2s;
            text-align: center;
        }

        #square-color-app .btn-blue:hover {
            background-color: #2563eb;
        }

        #square-color-app .btn-blue.small {
            padding: 4px 8px;
            font-size: 12px;
        }

        #square-color-app .btn-blue.block {
            display: block;
            margin-top: 8px;
        }

        #square-color-app #pdfButton {
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        #square-color-app #pdfButton:hover {
            background-color: #dc2626;
        }

        #square-color-app .section {
            margin-bottom: 12px;
            padding: 10px;
            background: #f9fafb;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            color: #111827;
        }

        #square-color-app h3 {
            font-size: 14px;
            margin: 0 0 10px 0;
            color: #374151;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 4px;
        }

        #square-color-app .color-preview {
            width: 30px;
            height: 30px;
            border: 1px solid #9ca3af;
            border-radius: 4px;
            display: inline-block;
        }

        #square-color-app .layout-columns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        #square-color-app .col-main {
            flex: 1;
            min-width: 300px;
        }

        #square-color-app .col-side {
            width: 140px;
            flex-shrink: 0;
            background: #fff;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
        }

        #square-color-app .presets-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }

        #square-color-app .preset-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #square-color-app .preset-btn {
            width: 24px;
            height: 24px;
            border: 1px solid #6b7280;
            border-radius: 4px;
            cursor: pointer;
        }

        #square-color-app canvas {
            display: block;
            border: 1px solid #d1d5db;
            background: #fafafa;
            margin-bottom: 10px;
            cursor: pointer;
            /* Managed by JS */
        }

        #square-color-app .canvas-hint {
            font-size: 13px;
            color: #4b5563;
            margin-bottom: 6px;
            font-weight: bold;
        }

        #square-color-app .bulk-control-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        #square-color-app .bulk-radios {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* --- Hover Modifiers --- */
        #square-color-app .modifier-blocks {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        #square-color-app .mod-block {
            border: 1px solid #9ca3af;
            padding: 8px 12px;
            border-radius: 4px;
            background: #fff;
            font-size: 13px;
            font-weight: bold;
            color: #374151;
            cursor: default;
            user-select: none;
        }

        #square-color-app .mod-block:hover {
            background: #eff6ff;
            border-color: #3b82f6;
            color: #1d4ed8;
        }
    </style>

<body style="background:#f0f0f0; padding:20px;">
    <!-- wp:html -->
    <div id="square-color-app">

        <div class="row row-start">
            <!-- サイズ指定 -->
            <div class="section" style="flex: 1; min-width: 250px;">
                <h3>サイズ指定</h3>
                <div class="row">
                    <div class="inline-field">
                        <label>垂直ひも (右へ)</label>
                        <div class="input-group">
                            <button type="button" class="btn-blue small btn-adjust-v" data-delta="-10">-10</button>
                            <button type="button" class="btn-blue small btn-adjust-v" data-delta="-1">-1</button>
                            <input type="number" id="numVertical" value="19" min="1" class="narrow-input">
                            <button type="button" class="btn-blue small btn-adjust-v" data-delta="1">+1</button>
                            <button type="button" class="btn-blue small btn-adjust-v" data-delta="10">+10</button>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="inline-field">
                        <label>編みひも (上へ)</label>
                        <div class="input-group">
                            <button type="button" class="btn-blue small btn-adjust-h" data-delta="-10">-10</button>
                            <button type="button" class="btn-blue small btn-adjust-h" data-delta="-1">-1</button>
                            <input type="number" id="numHorizontal" value="12" min="1" class="narrow-input">
                            <button type="button" class="btn-blue small btn-adjust-h" data-delta="1">+1</button>
                            <button type="button" class="btn-blue small btn-adjust-h" data-delta="10">+10</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ひも上下 -->
            <div class="section" style="flex: 1; min-width: 200px;">
                <h3>ひも上下</h3>
                <div class="inline-field">
                    <label>上下図名</label>
                    <select id="patternDropdown">
                        <option value="10;01" data-name="平編み">平編み</option>
                        <option value="1100;0110;0011;1001;" data-name="網代編み2つ飛び">網代編み2つ飛び</option>
                        <option value="111000;011100;001110;000111;100011;110001;" data-name="網代編み3つ飛び">網代編み3つ飛び
                        </option>
                        <option value="110;011;101;" data-name="3x3 2-1">3x3 2-1</option>
                        <option value="011;110;101;" data-name="3x3 1-2">3x3 1-2</option>
                        <option
                            value="1110000011;0111000111;0011101110;0001111100;1000111000;0001111100;0011101110;0111000111;1110000011;1100010001;"
                            data-name="花桝網代">花桝網代</option>
                    </select>
                </div>
                <div
                    style="margin-top: 8px; font-size: 12px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;">
                    内部ロジック: <span id="patternCodeDisplay">10;01</span>
                </div>
            </div>
        </div>

        <!-- 色指定 -->
        <div class="layout-columns">
            <div class="col-main">
                <div class="section">
                    <h3>色指定</h3>
                    <div class="row">
                        <div class="inline-field">
                            <label>現在の色</label>
                            <div class="input-group">
                                <div id="currentColorPreview" class="color-preview" style="background-color: #ff1493;">
                                </div>
                                <input type="color" id="currentColorInput" value="#ff1493"
                                    style="padding:0; width:30px; height:30px; border:none; cursor:pointer;"
                                    title="カラーピッカーを開く">
                            </div>
                        </div>
                        <div class="inline-field">
                            <label>代表色から選ぶ</label>
                            <select id="colorDropdown">
                                <option value="">---</option>
                                <option value="#ff0000">赤 (Red)</option>
                                <option value="#008000">緑 (Green)</option>
                                <option value="#0000ff">青 (Blue)</option>
                                <option value="#8b4513">茶 (Brown)</option>
                                <option value="#000000">黒 (Black)</option>
                                <option value="#ffffff">白 (White)</option>
                                <option value="#f5f5dc">ベージュ (Beige)</option>
                                <option value="#ffff00">イエロー (Yellow)</option>
                                <option value="#808080">グレー (Gray)</option>
                                <option value="#000080">紺 (Navy)</option>
                                <option value="#006400">深緑 (Dark Green)</option>
                                <option value="#654321">こげ茶 (Dark Brown)</option>
                                <option value="#ffa500">オレンジ (Orange)</option>
                                <option value="#ffc0cb">ピンク (Pink)</option>
                            </select>
                        </div>
                        <div class="inline-field">
                            <label>RGB入力</label>
                            <div class="input-group" style="font-size:12px;">
                                R <input type="number" id="rgb_r" min="0" max="255" value="255"
                                    class="narrow-input mini">
                                G <input type="number" id="rgb_g" min="0" max="255" value="20"
                                    class="narrow-input mini">
                                B <input type="number" id="rgb_b" min="0" max="255" value="147"
                                    class="narrow-input mini">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 一括色割り当て -->
                <div class="section">
                    <h3>一括色割り当て</h3>
                    <div class="bulk-control-row">
                        <div class="bulk-radios">
                            <label style="font-size: 13px;"><input type="radio" name="bulkTarget" value="vertical"
                                    checked> 垂直ひも(左から)</label>
                            <label style="font-size: 13px;"><input type="radio" name="bulkTarget" value="horizontal">
                                編みひも(下から)</label>
                        </div>

                        <div class="inline-field" style="margin-left:8px;">
                            <label>開始位置</label>
                            <div class="input-group">
                                <input type="number" id="bulkStart" value="1" min="1" class="narrow-input">
                                <span>本目から</span>
                            </div>
                        </div>

                        <div class="inline-field" style="margin-left:8px;">
                            <label>間隔 (0は開始位置のみ)</label>
                            <div class="input-group">
                                <input type="number" id="bulkStep" value="1" min="0" class="narrow-input">
                                <span>本ごと</span>
                            </div>
                        </div>

                        <div style="margin-left: auto;">
                            <button type="button" class="btn-blue" id="btnApplyBulk">現在色の適用</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-side">
                <div style="font-size:12px; font-weight:bold; color:#374151; margin-bottom:4px;">プリセット色</div>
                <div style="font-size:10px; color:#6b7280;">クリックで現在の色へ</div>
                <div class="presets-list" id="presetsContainer">
                    <!-- JS generated presets -->
                </div>
            </div>
        </div>

        <div class="canvas-hint">💡
            バンドの端をクリックすると「現在の色」に変わります。<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;左上セルで垂直ひも全て・左下セルで編みひも全てが現在の色になります。</div>
        <canvas id="weaveCanvas"></canvas>

        <!-- Pattern Name moved to canvas -->

        <div class="modifier-blocks">
            <div class="mod-block" id="modMirrorX">左右反転</div>
            <div class="mod-block" id="modInvertY">上下交換</div>
            <div class="mod-block" id="modBoth">上下左右</div>
        </div>

        <button type="button" id="pdfButton">PDFでダウンロード</button>

    </div>

    <script>
        //<![CDATA[
        (() => {
            // --- Elements and State ---
            const containerId = "square-color-app";

            // In case of multiple IDs, we find the container reliably using currentScript.
            let container = null;
            if (document.currentScript) {
                container = document.currentScript.closest('#' + containerId) || document.currentScript.parentElement;
            } else {
                container = document.getElementById(containerId);
            }
            if (!container) return;

            const el = s => container.querySelector(s);

            const CELL_SIZE = 24; // Pixel size per grid cell

            let vBands = 19;
            let hBands = 12;
            let currentColor = '#ff1493'; // Deep Pink Default
            let currentPatternStr = '10;01';

            let verticalColors = [];
            let horizontalColors = [];

            // Display modifier flags
            let modMirrorX = false;
            let modInvertY = false;

            // Pre-defined presets logic
            const presets = [
                { hex: '#ff1493' }, // Color 1: Deep Pink
                { hex: '#00bfff' }, // Color 2: Deep Sky Blue
                { hex: '#0000ff' }, // Color 3: Blue
                { hex: '#8b4513' }, // Color 4: Brown
                { hex: '#000000' }, // Color 5: Black
                { hex: '#ffffff' }  // Color 6: White
            ];

            // --- Utily Functions ---
            const hexToRgb = (hex) => {
                let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 0, g: 0, b: 0 };
            };
            const rgbToHex = (r, g, b) => {
                return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
            };

            // --- Size Logic ---
            const performAdjustSize = (type, delta) => {
                let elem = type === 'vertical' ? el('#numVertical') : el('#numHorizontal');
                let val = parseInt(elem.value) || 0;
                let newVal = Math.max(1, val + delta);
                elem.value = newVal;

                if (type === 'vertical') {
                    while (verticalColors.length < newVal) verticalColors.push(currentColor);
                    if (verticalColors.length > newVal) verticalColors.length = newVal;
                    vBands = newVal;
                } else {
                    while (horizontalColors.length < newVal) horizontalColors.push(currentColor);
                    if (horizontalColors.length > newVal) horizontalColors.length = newVal;
                    hBands = newVal;
                }
                drawCanvas();
            };

            // --- Color Logic ---
            const setCurrentColor = (hex, skipRgbUpdate = false) => {
                currentColor = hex.toLowerCase();
                el('#currentColorPreview').style.backgroundColor = hex;
                el('#currentColorInput').value = hex;

                // Update dropdown if matches
                const dd = el('#colorDropdown');
                let found = false;
                for (let i = 0; i < dd.options.length; i++) {
                    if (dd.options[i].value.toLowerCase() === currentColor) {
                        dd.selectedIndex = i;
                        found = true; break;
                    }
                }
                if (!found) dd.selectedIndex = 0; // "---"

                if (!skipRgbUpdate) {
                    const rgb = hexToRgb(hex);
                    el('#rgb_r').value = rgb.r;
                    el('#rgb_g').value = rgb.g;
                    el('#rgb_b').value = rgb.b;
                }
            };

            const setupColorListeners = () => {
                const cInp = el('#currentColorInput');
                cInp.addEventListener('input', e => setCurrentColor(e.target.value));

                el('#colorDropdown').addEventListener('change', e => {
                    if (e.target.value) setCurrentColor(e.target.value);
                });

                const updateFromRgb = () => {
                    let r = Math.max(0, Math.min(255, parseInt(el('#rgb_r').value) || 0));
                    let g = Math.max(0, Math.min(255, parseInt(el('#rgb_g').value) || 0));
                    let b = Math.max(0, Math.min(255, parseInt(el('#rgb_b').value) || 0));
                    el('#rgb_r').value = r; el('#rgb_g').value = g; el('#rgb_b').value = b;
                    setCurrentColor(rgbToHex(r, g, b), true);
                };
                el('#rgb_r').addEventListener('change', updateFromRgb);
                el('#rgb_g').addEventListener('change', updateFromRgb);
                el('#rgb_b').addEventListener('change', updateFromRgb);
            };

            const setupPresets = () => {
                const cont = el('#presetsContainer');
                cont.innerHTML = '';
                presets.forEach((p, idx) => {
                    const group = document.createElement('div');
                    group.className = 'preset-item';

                    const btn = document.createElement('div');
                    btn.className = 'preset-btn';
                    btn.style.backgroundColor = p.hex;
                    btn.title = `色${idx + 1}`;
                    btn.onclick = () => setCurrentColor(p.hex);

                    const pickerInp = document.createElement('input');
                    pickerInp.type = 'color';
                    pickerInp.value = p.hex;
                    pickerInp.title = `色${idx + 1} を変更`;
                    pickerInp.style.width = '24px';
                    pickerInp.style.height = '24px';
                    pickerInp.style.padding = '0';
                    pickerInp.style.border = 'none';
                    pickerInp.style.cursor = 'pointer';

                    pickerInp.addEventListener('input', e => {
                        const newColor = e.target.value;
                        p.hex = newColor;
                        btn.style.backgroundColor = newColor;
                        setCurrentColor(newColor);
                    });

                    group.appendChild(btn);
                    group.appendChild(pickerInp);
                    cont.appendChild(group);
                });
            };

            // --- Bulk Logic ---
            const performApplyBulkColor = () => {
                let target = container.querySelector('input[name="bulkTarget"]:checked').value;
                let start = parseInt(el('#bulkStart').value) || 1;
                let step = parseInt(el('#bulkStep').value) || 0;

                let startIndex = start - 1;
                if (startIndex < 0) { alert('開始位置は1以上を指定してください。'); return; }

                let t_arr = target === 'vertical' ? verticalColors : horizontalColors;

                if (startIndex >= t_arr.length) return;

                if (step === 0) {
                    t_arr[startIndex] = currentColor;
                } else {
                    for (let i = startIndex; i < t_arr.length; i += step) {
                        t_arr[i] = currentColor;
                    }
                }
                drawCanvas();
            };

            // --- Modifier Hover Logic ---
            const performSetModifier = (type) => {
                if (type === 'mirrorX') { modMirrorX = true; modInvertY = false; }
                else if (type === 'invertY') { modMirrorX = false; modInvertY = true; }
                else if (type === 'both') { modMirrorX = true; modInvertY = true; }
                drawCanvas();
            };
            const performClearModifier = () => {
                modMirrorX = false;
                modInvertY = false;
                drawCanvas();
            };

            // --- general Controls ---
            const setupControls = () => {
                el('#numVertical').addEventListener('change', e => performAdjustSize('vertical', 0));
                el('#numHorizontal').addEventListener('change', e => performAdjustSize('horizontal', 0));

                container.querySelectorAll('.btn-adjust-v').forEach(btn => {
                    btn.addEventListener('click', () => performAdjustSize('vertical', parseInt(btn.getAttribute('data-delta'))));
                });
                container.querySelectorAll('.btn-adjust-h').forEach(btn => {
                    btn.addEventListener('click', () => performAdjustSize('horizontal', parseInt(btn.getAttribute('data-delta'))));
                });

                el('#btnApplyBulk').addEventListener('click', performApplyBulkColor);

                const bindMod = (id, type) => {
                    const block = el(id);
                    if (block) {
                        block.addEventListener('mouseenter', () => performSetModifier(type));
                        block.addEventListener('mouseleave', performClearModifier);
                    }
                };
                bindMod('#modMirrorX', 'mirrorX');
                bindMod('#modInvertY', 'invertY');
                bindMod('#modBoth', 'both');

                el('#patternDropdown').addEventListener('change', e => {
                    currentPatternStr = e.target.value;
                    el('#patternCodeDisplay').textContent = currentPatternStr;

                    // Pattern name updates in canvas automatically

                    drawCanvas();
                });

                el('#pdfButton').addEventListener('click', () => {
                    const cv = el('#weaveCanvas');
                    try {
                        const { jsPDF } = window.jspdf;
                        const d = cv.height > cv.width ? 'p' : 'l';
                        const pdf = new jsPDF({ orientation: d, unit: 'mm', format: 'a4' });
                        const pW = d === 'p' ? 210 : 297, pH = d === 'p' ? 297 : 210, m = 10;
                        const id = cv.toDataURL("image/png");

                        const imgProps = pdf.getImageProperties(id);
                        const r = imgProps.width / imgProps.height;
                        let w = pW - m * 2, h = w / r;
                        if (h > pH - m * 2) { h = pH - m * 2; w = h * r; }

                        pdf.addImage(id, 'PNG', m, m, w, h);
                        pdf.save("square-color.pdf");
                    } catch (e) {
                        alert("PDF生成エラー: " + e.message);
                        console.error(e);
                    }
                });
            };

            // --- Canvas Rendering ---
            const drawCanvas = () => {
                const cv = el('#weaveCanvas');
                const ctx = cv.getContext('2d');

                const matrix = currentPatternStr.split(';').filter(s => s.trim() !== '').map(row => row.split('').map(Number));
                // Base index properly maps to (0,0) starting at bottom-left

                let pHeight = matrix.length;
                let pWidth = pHeight > 0 ? matrix[0].length : 1;

                const getLogic = (colIdx, rowIdx) => {
                    // Apply display modifiers
                    let cRef = modMirrorX ? (vBands - 1 - colIdx) : colIdx;

                    let r = rowIdx % pHeight;
                    let c = cRef % pWidth;

                    let logic = matrix[r][c];

                    if (modInvertY) {
                        logic = 1 - logic; // 0 becomes 1, 1 becomes 0
                    }

                    return logic;
                };

                const logicCols = vBands;
                const logicRows = hBands;
                const totCols = logicCols + 2; // +1 left, +1 right
                const totRows = logicRows + 2; // +1 top, +1 bottom

                const contentW = totCols * CELL_SIZE;
                const contentH = totRows * CELL_SIZE;

                const FOOTER_SPACE = 65; // Extra space for Pattern Name and Time/URL
                cv.width = contentW;
                cv.height = contentH + FOOTER_SPACE;

                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, cv.width, cv.height);

                // --- Draw Horizontal Bands ---
                for (let hr = 0; hr < logicRows; hr++) {
                    let y = (logicRows - hr) * CELL_SIZE;
                    let c = horizontalColors[hr];
                    ctx.fillStyle = c;

                    let leftX = 0;
                    let rightX = (totCols - 1) * CELL_SIZE;

                    ctx.fillRect(leftX, y, CELL_SIZE, CELL_SIZE); // Left end
                    ctx.fillRect(rightX, y, CELL_SIZE, CELL_SIZE); // Right end
                    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                    ctx.strokeRect(leftX, y, CELL_SIZE, CELL_SIZE);
                    ctx.strokeRect(rightX, y, CELL_SIZE, CELL_SIZE);

                    // Display Indicies
                    ctx.fillStyle = '#111827';
                    ctx.font = '10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    let numLabel = (hr + 1).toString();
                    ctx.fillText(numLabel, leftX + CELL_SIZE / 2, y + CELL_SIZE / 2);
                    ctx.fillText(numLabel, rightX + CELL_SIZE / 2, y + CELL_SIZE / 2);
                }

                // --- Draw Vertical Bands ---
                for (let vc = 0; vc < logicCols; vc++) {
                    let dispVc = modMirrorX ? (logicCols - 1 - vc) : vc; // Map visual column to actual array index
                    let c = verticalColors[dispVc];
                    let x = (vc + 1) * CELL_SIZE;
                    ctx.fillStyle = c;

                    let topY = 0;
                    let botY = (totRows - 1) * CELL_SIZE;

                    ctx.fillRect(x, topY, CELL_SIZE, CELL_SIZE); // Top end
                    ctx.fillRect(x, botY, CELL_SIZE, CELL_SIZE); // Bottom end
                    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                    ctx.strokeRect(x, topY, CELL_SIZE, CELL_SIZE);
                    ctx.strokeRect(x, botY, CELL_SIZE, CELL_SIZE);

                    // Display Indicies
                    ctx.fillStyle = '#111827';
                    ctx.font = '10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    let numLabel = (dispVc + 1).toString();
                    ctx.fillText(numLabel, x + CELL_SIZE / 2, topY + CELL_SIZE / 2);
                    ctx.fillText(numLabel, x + CELL_SIZE / 2, botY + CELL_SIZE / 2);
                }

                // --- Draw Corner Cells (Special Actions) ---
                // Top-Left (Vertical All)
                ctx.fillStyle = '#e5e7eb';
                ctx.fillRect(0, 0, CELL_SIZE, CELL_SIZE);
                ctx.strokeRect(0, 0, CELL_SIZE, CELL_SIZE);

                // Bottom-Left (Horizontal All)
                let yBotL = (totRows - 1) * CELL_SIZE;
                ctx.fillRect(0, yBotL, CELL_SIZE, CELL_SIZE);
                ctx.strokeRect(0, yBotL, CELL_SIZE, CELL_SIZE);

                // --- Intersections ---
                for (let hr = 0; hr < logicRows; hr++) {
                    for (let vc = 0; vc < logicCols; vc++) {
                        let dispVc = modMirrorX ? (logicCols - 1 - vc) : vc;
                        let logic = getLogic(vc, hr);

                        let cellC = logic === 1 ? verticalColors[dispVc] : horizontalColors[hr];

                        let y = (logicRows - hr) * CELL_SIZE;
                        let x = (vc + 1) * CELL_SIZE;

                        ctx.fillStyle = cellC;
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                        ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
                    }
                }

                // --- Weave Area Thick Border ---
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#374151'; // Dark gray outline
                ctx.strokeRect(CELL_SIZE, CELL_SIZE, logicCols * CELL_SIZE, logicRows * CELL_SIZE);
                ctx.lineWidth = 1; // Reset line width

                // --- Canvas Footer (Time & URL & Pattern Name) ---
                const selectedOpt = el('#patternDropdown').options[el('#patternDropdown').selectedIndex];
                const patternNameStr = "上下図名: " + (selectedOpt.getAttribute('data-name') || selectedOpt.text);

                const now = new Date();
                const pad = (n) => n.toString().padStart(2, '0');
                const timeStr = `${now.getFullYear()}/${pad(now.getMonth() + 1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
                const footerText = `${timeStr}  https://labo.com/CraftBand/sharing/square-color/`;

                ctx.save();

                // Draw Pattern Name
                ctx.textAlign = "left";
                ctx.textBaseline = "top";
                ctx.fillStyle = "#374151";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(patternNameStr, 10, contentH + 12);

                // Draw Date and URL
                ctx.textAlign = "right"; ctx.textBaseline = "bottom";
                ctx.font = "12px sans-serif"; ctx.fillStyle = "#666";
                ctx.fillText(footerText, cv.width - 10, cv.height - 10);

                // --- Modifiers Active Text (Optional, helps users know it's a preview mode)
                if (modMirrorX || modInvertY) {
                    ctx.textAlign = "left";
                    ctx.fillStyle = "#dc2626";
                    ctx.font = "bold 12px sans-serif";
                    ctx.fillText("[プレビュー表示中]", 10, cv.height - 10);
                }

                ctx.restore();
            };

            // --- Interaction Logic ---
            const getCanvasHit = (e) => {
                const cv = el('#weaveCanvas');
                const rect = cv.getBoundingClientRect();
                const scaleX = cv.width / rect.width;
                const scaleY = cv.height / rect.height;

                const mx = (e.clientX - rect.left) * scaleX;
                const my = (e.clientY - rect.top) * scaleY;

                const cellX = Math.floor(mx / CELL_SIZE);
                const cellY = Math.floor(my / CELL_SIZE);

                const logicCols = vBands;
                const logicRows = hBands;
                const totCols = logicCols + 2;
                const totRows = logicRows + 2;

                let hitType = null;
                let hitIdx = -1;

                if (cellX === 0 && cellY === 0) {
                    hitType = 'top-left-corner';
                    return { hitType, hitIdx };
                }
                if (cellX === 0 && cellY === totRows - 1) {
                    hitType = 'bot-left-corner';
                    return { hitType, hitIdx };
                }

                if (cellY >= 1 && cellY <= logicRows) {
                    if (cellX === 0 || cellX === totCols - 1) {
                        hitType = 'h';
                        hitIdx = logicRows - cellY; // Data index
                    }
                }

                if (cellX >= 1 && cellX <= logicCols) {
                    if (cellY === 0 || cellY === totRows - 1) {
                        hitType = 'v';
                        hitIdx = cellX - 1;
                        if (modMirrorX) {
                            hitIdx = logicCols - 1 - hitIdx; // Click maps correctly when mirrored
                        }
                    }
                }

                return { hitType, hitIdx };
            };

            // --- Initial Setup ---
            const initApp = () => {
                setupPresets();
                setupColorListeners();
                setupControls();

                // Setup Canvas Interaction Listeners
                el('#weaveCanvas').addEventListener('mousemove', e => {
                    const { hitType } = getCanvasHit(e);
                    el('#weaveCanvas').style.cursor = hitType ? 'pointer' : 'default';
                });

                el('#weaveCanvas').addEventListener('click', e => {
                    const { hitType, hitIdx } = getCanvasHit(e);

                    if (hitType === 'h') {
                        if (hitIdx >= 0) {
                            if (hitIdx < hBands) {
                                horizontalColors[hitIdx] = currentColor;
                                drawCanvas();
                            }
                        }
                    } else if (hitType === 'v') {
                        if (hitIdx >= 0) {
                            if (hitIdx < vBands) {
                                verticalColors[hitIdx] = currentColor;
                                drawCanvas();
                            }
                        }
                    } else if (hitType === 'top-left-corner') {
                        for (let i = 0; i < vBands; i++) verticalColors[i] = currentColor;
                        drawCanvas();
                    } else if (hitType === 'bot-left-corner') {
                        for (let i = 0; i < hBands; i++) horizontalColors[i] = currentColor;
                        drawCanvas();
                    }
                });

                // Initialize band arrays with their direction's default color.
                verticalColors = Array(vBands).fill(presets[0].hex);
                horizontalColors = Array(hBands).fill(presets[1].hex);

                // Keep initial currentColor to preset 1
                setCurrentColor(presets[0].hex, true);
                drawCanvas();
            };

            // Start Execution
            initApp();
        })();
        //]]>
    </script>
</body>
